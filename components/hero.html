<!-- Hero Header Section -->
 <header class="relative min-h-screen flex items-center pt-32 overflow-visible z-20" id="hero-bg">
    <!-- Left Side Color Background - Mobile Full, Desktop None -->
    <div class="left-bg-layer absolute left-0 top-0 h-full bg-primary w-1/2 lg:w-0" style="opacity: 0.1; z-index: -3;"></div>
    <!-- Right Side Color Background - Mobile & Desktop -->
    <div class="right-bg-layer absolute right-0 top-0 h-full bg-slate-900 w-1/2 lg:w-0" style="opacity: 0.15; z-index: -3;"></div>
    
    <!-- Hero Video: Vertical Fullscreen, No Frame, Right Side (2/3 width) -->
    <div class="absolute top-0 right-0 h-full w-full lg:w-2/3 hero-grid opacity-0 z-0 hidden lg:block" style="will-change: transform; backface-visibility: hidden; -webkit-backface-visibility: hidden;">
        <video id="hero-video-player" autoplay loop muted playsinline preload="auto" webkit-playsinline class="w-full h-full object-cover">
            <source src="assets/hero_video/herovideo.mp4" type="video/mp4">
        </video>
        <!-- Gradient Overlay for smooth text transition -->
        <div class="absolute top-0 -left-1 h-full w-64 bg-gradient-to-r from-rose-50 via-rose-50/80 to-transparent"></div>
    </div>
    
    <!-- Mobile Video - Outside Container for Full Width -->
    <div class="w-full lg:hidden hero-grid absolute top-0 left-0 right-0" style="z-index: 5; margin-top: 80px; opacity: 1;">
        <div class="relative w-full overflow-hidden shadow-xl" style="aspect-ratio: 16/9;">
            <video id="hero-video-player-mobile" autoplay loop muted playsinline preload="auto" webkit-playsinline class="w-full h-full object-cover">
                <source src="assets/hero_video/herovideo.mp4" type="video/mp4">
            </video>
            <!-- Play Button Overlay (shown if autoplay fails) -->
            <button id="mobile-video-play-btn" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-primary text-white w-16 h-16 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition-transform hidden">
                <i class="fas fa-play text-2xl ml-1"></i>
            </button>
        </div>
    </div>
    
    <div class="container mx-auto px-6 lg:px-16 relative hero-mobile-spacing" style="z-index: 10; margin-top: -70px;" id="hero-container-mobile">
        <div class="flex flex-col lg:flex-row items-center gap-12 h-full">
            <div class="w-full lg:w-1/2 text-left lg:pl-12" style="margin-left: -10px;">
                <span class="hero-badge inline-block py-1 px-4 border border-gray-200 rounded-full text-xs font-bold lowercase tracking-[0.2em] mb-6 bg-white opacity-0">
                    <span>we <span class="text-primary font-bold">are</span> digital corporate radio!</span>
                </span>
                <h1 class="text-4xl md:text-5xl lg:text-7xl leading-tight mb-8 font-thin text-slate-900 text-left">
                    <span class="hero-brand block opacity-0"><span class="font-bold text-slate-400 lg:text-slate-900 text-3xl sm:text-4xl md:text-5xl lg:text-7xl">YOUR</span> <span class="font-bold text-3xl sm:text-4xl md:text-5xl lg:text-7xl" style="color: #e7274d;">BRAND</span></span>
                    <span class="hero-sound block mt-4 md:mt-6 mb-1 font-bold text-primary text-3xl sm:text-4xl md:text-5xl lg:text-7xl opacity-0">YOUR</span>
                    <span class="hero-track block font-bold text-primary text-3xl sm:text-4xl md:text-5xl lg:text-7xl opacity-0"> SOUNDTRACK</span>
                </h1>
                <p class="hero-desc text-base sm:text-lg md:text-xl font-light text-slate-700 w-full max-w-[100%] lg:max-w-[70%] mb-6 md:mb-12 leading-relaxed opacity-0">
                    be radio! – die cloudbasierende Musiklösung für angenehme Atmosphäre & optimale <br>Instore-Kommunikation.
                </p>
                <div class="hero-button flex flex-row justify-start gap-4 w-full lg:w-auto opacity-0 mt-8 md:mt-4">
                    <a href="test.html" class="bg-primary text-white px-8 md:px-10 py-4 rounded-full font-bold hover:bg-primary-hover transition shadow-xl shadow-primary/30 hover:shadow-primary/50 hover:scale-105 transform duration-300 flex items-center justify-center gap-3 group w-full lg:w-auto">
                        <i class="fas fa-play text-xs group-hover:scale-125 transition-transform"></i> Jetzt testen
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>
