<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup & Installation - be radio</title>
        <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/logos/logo.png">
    <link rel="shortcut icon" type="image/png" href="assets/logos/logo.png">
        <!-- External Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script src="js/config.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- GSAP Animation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        /* Fallback: Show page after 2 seconds even if animations fail */
        body {
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        body.loaded {
            opacity: 1 !important;
        }
    </style>
    
    <script>
        // Emergency fallback: Make page visible after 2 seconds
        setTimeout(function() {
            document.body.classList.add('loaded');
        }, 2000);
    </script>
</head>
<body class="text-slate-800 antialiased bg-slate-50">

    <!-- Navigation Container (Setup-specific) -->
    <div id="navigation-setup"></div>

    <!-- Main Content -->
    <main>
        <div id="setup-content"></div>
        <div id="benefits"></div>
    </main>

    <!-- Footer Container -->
    <div id="footer"></div>
    
    <!-- Modals Container -->
    <div id="modals"></div>

    <!-- Scroll to Top Button -->
    <button id="scrollToTop" aria-label="Nach oben scrollen">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- JavaScript: Animations -->
    <script src="js/animations.js"></script>

    <!-- JavaScript: Component Loader -->
    <script>
        async function loadComponent(elementId, componentPath) {
            try {
                const response = await fetch(componentPath);
                if (!response.ok) {
                    throw new Error(`Failed to load ${componentPath}: ${response.statusText}`);
                }
                const html = await response.text();
                const element = document.getElementById(elementId);
                if (element) {
                    element.innerHTML = html;
                }
            } catch (error) {
                console.error(`Error loading component ${componentPath}:`, error);
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            await Promise.all([
                loadComponent('navigation-setup', 'components/navigation-setup.html'),
                loadComponent('setup-content', 'components/setup-content.html'),
                loadComponent('benefits', 'components/benefits.html'),
                loadComponent('footer', 'components/footer.html'),
                loadComponent('modals', 'components/modals.html')
            ]);

            document.querySelectorAll('a[href="#hero-bg"]').forEach(link => {
                link.href = 'index.html';
            });

            // Navigation rechtsbündig ausrichten (neben Login-Button)
            const navContainer = document.querySelector('#navigation-setup .hidden.md\\:flex > div:first-child');
            if (navContainer) {
                navContainer.classList.remove('justify-center');
                navContainer.classList.add('justify-end', 'mr-8');
            }

            // Mobile Menu initialisieren
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            if (mobileMenuBtn && mobileMenu) {
                mobileMenuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
                mobileMenu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => mobileMenu.classList.add('hidden')));
            }

            // Initialize animations after content is loaded
            try {
                if (typeof initAnimations === 'function') {
                    setTimeout(initAnimations, 100);
                } else {
                    console.warn('initAnimations function not found');
                    document.body.classList.add('loaded');
                }
            } catch (error) {
                console.error('Error initializing animations:', error);
                document.body.classList.add('loaded');
            }
        });
    </script>
    
    <!-- JavaScript: Scroll to Top -->
    <script src="js/scrollToTop.js"></script>
</body>
</html>
